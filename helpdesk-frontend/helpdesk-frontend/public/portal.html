<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AI-Assisted Customer Support System</title>

  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&display=swap');

    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      min-height: 100vh;
      background: radial-gradient(ellipse at top left, #3b2b8c 0%, #1a1540 40%, #0d0c1d 100%);
      font-family: 'Inter', 'Segoe UI', sans-serif;
      color: #fff;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    /* ✨ Ambient glow layers */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background:
        radial-gradient(circle at 20% 15%, rgba(255, 215, 120, 0.10), transparent 45%),
        radial-gradient(circle at 80% 85%, rgba(180, 120, 255, 0.12), transparent 50%),
        radial-gradient(circle at 60% 30%, rgba(255, 215, 120, 0.05), transparent 38%);
      pointer-events: none;
    }

    /* ✨ Animated floating orbs */
    .orb {
      position: fixed;
      border-radius: 50%;
      filter: blur(80px);
      opacity: 0.18;
      animation: drift 12s ease-in-out infinite alternate;
      pointer-events: none;
    }

    .orb-1 {
      width: 400px;
      height: 400px;
      background: #7c3aed;
      top: -100px;
      left: -100px;
    }

    .orb-2 {
      width: 320px;
      height: 320px;
      background: #d4af37;
      bottom: -80px;
      right: -80px;
      animation-delay: -6s;
    }

    .orb-3 {
      width: 250px;
      height: 250px;
      background: #a855f7;
      top: 50%;
      left: 60%;
      animation-delay: -3s;
    }

    @keyframes drift {
      from {
        transform: translate(0, 0) scale(1);
      }

      to {
        transform: translate(30px, 20px) scale(1.08);
      }
    }

    /* 🃏 Glass Card */
    .card {
      position: relative;
      background: linear-gradient(145deg, rgba(43, 40, 85, 0.85), rgba(20, 18, 55, 0.9));
      border: 1px solid rgba(214, 194, 143, 0.35);
      border-radius: 32px;
      padding: 56px 52px 52px;
      width: 420px;
      text-align: center;
      backdrop-filter: blur(24px);
      -webkit-backdrop-filter: blur(24px);
      box-shadow:
        0 32px 80px rgba(0, 0, 0, 0.7),
        0 0 0 1px rgba(255, 255, 255, 0.04) inset,
        0 1px 0 rgba(255, 255, 255, 0.1) inset;
      animation: fadeSlideIn 0.7s cubic-bezier(0.34, 1.56, 0.64, 1) both;
    }

    @keyframes fadeSlideIn {
      from {
        opacity: 0;
        transform: translateY(24px) scale(0.96);
      }

      to {
        opacity: 1;
        transform: translateY(0) scale(1);
      }
    }

    /* ✨ Top accent line */
    .card::before {
      content: '';
      position: absolute;
      top: 0;
      left: 50%;
      transform: translateX(-50%);
      width: 60%;
      height: 2px;
      background: linear-gradient(90deg, transparent, #d4af37, transparent);
      border-radius: 2px;
    }

    /* 🎮 Squid Game shapes */
    .squid-shapes {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 14px;
      margin-bottom: 20px;
      animation: shapeGlow 3s ease-in-out infinite;
    }

    @keyframes shapeGlow {

      0%,
      100% {
        filter: drop-shadow(0 0 6px rgba(255, 50, 120, 0.5));
      }

      50% {
        filter: drop-shadow(0 0 16px rgba(255, 50, 120, 0.9));
      }
    }

    /* Circle */
    .sq-circle {
      width: 36px;
      height: 36px;
      border-radius: 50%;
      border: 3.5px solid #ff3278;
      background: transparent;
    }

    /* Triangle */
    .sq-triangle {
      width: 0;
      height: 0;
      border-left: 20px solid transparent;
      border-right: 20px solid transparent;
      border-bottom: 36px solid #ffffff;
      filter: none;
    }

    /* Square */
    .sq-square {
      width: 34px;
      height: 34px;
      border: 3.5px solid #ff3278;
      background: transparent;
    }

    /* 🏷️ Title */
    .title {
      font-size: 1.35rem;
      font-weight: 900;
      letter-spacing: 0.5px;
      line-height: 1.3;
      background: linear-gradient(135deg, #f7d774, #d4af37, #fffbe8);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 8px;
    }

    /* 🔖 Subtitle */
    .subtitle {
      font-size: 0.85rem;
      font-weight: 500;
      color: rgba(200, 190, 230, 0.75);
      letter-spacing: 2px;
      text-transform: uppercase;
      margin-bottom: 40px;
    }

    /* ─── Divider ─── */
    .divider {
      width: 48px;
      height: 2px;
      background: linear-gradient(90deg, transparent, rgba(212, 175, 55, 0.5), transparent);
      margin: 0 auto 36px;
    }

    /* 🔘 Portal Buttons */
    .portal-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      width: 100%;
      padding: 16px 28px;
      margin-bottom: 16px;
      border-radius: 18px;
      border: none;
      cursor: pointer;
      font-size: 1rem;
      font-weight: 700;
      letter-spacing: 0.4px;
      font-family: 'Inter', sans-serif;
      transition: all 0.25s cubic-bezier(0.34, 1.56, 0.64, 1);
      position: relative;
      overflow: hidden;
    }

    .portal-btn::after {
      content: '';
      position: absolute;
      inset: 0;
      background: rgba(255, 255, 255, 0);
      transition: background 0.2s;
    }

    .portal-btn:hover::after {
      background: rgba(255, 255, 255, 0.07);
    }

    /* 👤 User button — Purple glass */
    .btn-user {
      background: linear-gradient(135deg, #4c3799, #3b2b8c);
      color: #e0d8ff;
      border: 1px solid rgba(180, 140, 255, 0.35);
      box-shadow:
        0 8px 24px rgba(76, 55, 153, 0.5),
        inset 0 1px 0 rgba(255, 255, 255, 0.12);
    }

    .btn-user:hover {
      transform: translateY(-3px) scale(1.02);
      box-shadow:
        0 14px 36px rgba(76, 55, 153, 0.7),
        inset 0 1px 0 rgba(255, 255, 255, 0.18);
    }

    /* 👑 Admin button — Gold */
    .btn-admin {
      background: linear-gradient(135deg, #f7d774, #d4af37, #b8962e);
      color: #2b2100;
      border: 1px solid rgba(255, 220, 80, 0.4);
      box-shadow:
        0 8px 24px rgba(212, 175, 55, 0.45),
        inset 0 1px 0 rgba(255, 255, 255, 0.65);
    }

    .btn-admin:hover {
      transform: translateY(-3px) scale(1.02);
      box-shadow:
        0 14px 36px rgba(212, 175, 55, 0.7),
        inset 0 1px 0 rgba(255, 255, 255, 0.8);
    }

    .btn-icon {
      font-size: 1.3rem;
    }

    /* 🏷️ Footer badge */
    .badge-footer {
      margin-top: 32px;
      font-size: 0.72rem;
      color: rgba(180, 170, 220, 0.45);
      letter-spacing: 1px;
    }
  </style>
</head>

<body>

  <!-- Animated orbs -->
  <div class="orb orb-1"></div>
  <div class="orb orb-2"></div>
  <div class="orb orb-3"></div>

  <!-- Glass Card -->
  <div class="card">
    <div class="squid-shapes">
      <div class="sq-circle"></div>
      <div class="sq-triangle"></div>
      <div class="sq-square"></div>
    </div>

    <div class="title">AI-Assisted Customer<br>Support System</div>
    <div class="subtitle">Secure Access Portal</div>
    <div class="divider"></div>

    <button class="portal-btn btn-user" onclick="window.location.href='user-login.html'">
      <span class="btn-icon">👤</span>
      User Portal
    </button>

    <button class="portal-btn btn-admin" onclick="window.location.href='admin-login-role.html'">
      <span class="btn-icon">👩🏻‍💻</span>
      Admin Portal
    </button>

    <div class="badge-footer">© 2026 AI HELPDESK · SECURE PORTAL</div>
  </div>

</body>

</html>
