<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Register — AI Support</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap');

        *,
        *::before,
        *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            min-height: 100vh;
            background: radial-gradient(ellipse at top left, #3b2b8c 0%, #1a1540 40%, #0d0c1d 100%);
            font-family: 'Inter', 'Segoe UI', sans-serif;
            color: #fff;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background:
                radial-gradient(circle at 25% 20%, rgba(255, 215, 120, 0.09), transparent 45%),
                radial-gradient(circle at 75% 80%, rgba(180, 120, 255, 0.1), transparent 50%);
            pointer-events: none;
        }

        .orb {
            position: fixed;
            border-radius: 50%;
            filter: blur(80px);
            opacity: 0.15;
            animation: drift 12s ease-in-out infinite alternate;
            pointer-events: none;
        }

        .orb-1 {
            width: 350px;
            height: 350px;
            background: #7c3aed;
            top: -80px;
            left: -80px;
        }

        .orb-2 {
            width: 260px;
            height: 260px;
            background: #d4af37;
            bottom: -60px;
            right: -60px;
            animation-delay: -6s;
        }

        @keyframes drift {
            from {
                transform: translate(0, 0) scale(1);
            }

            to {
                transform: translate(25px, 18px) scale(1.07);
            }
        }

        .back-btn {
            position: fixed;
            top: 24px;
            left: 24px;
            padding: 10px 20px;
            border-radius: 22px;
            border: none;
            cursor: pointer;
            font-weight: 700;
            font-family: 'Inter', sans-serif;
            font-size: 0.85rem;
            background: linear-gradient(135deg, #d6c28f, #b89b5e);
            color: #2b2100;
            box-shadow: 0 6px 16px rgba(214, 194, 143, 0.4), inset 0 1px 0 rgba(255, 255, 255, 0.65);
            transition: all 0.25s ease;
        }

        .back-btn:hover {
            transform: translateY(-1px);
        }

        .card {
            position: relative;
            background: linear-gradient(145deg, rgba(43, 40, 85, 0.88), rgba(20, 18, 55, 0.92));
            border: 1px solid rgba(214, 194, 143, 0.3);
            border-radius: 28px;
            padding: 48px 44px;
            width: 420px;
            text-align: center;
            backdrop-filter: blur(20px);
            box-shadow: 0 28px 70px rgba(0, 0, 0, 0.65), inset 0 1px 0 rgba(255, 255, 255, 0.08);
            animation: fadeIn 0.6s cubic-bezier(0.34, 1.45, 0.64, 1) both;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(20px) scale(0.97);
            }

            to {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
        }

        .card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 55%;
            height: 2px;
            background: linear-gradient(90deg, transparent, #d4af37, transparent);
            border-radius: 2px;
        }

        .icon {
            font-size: 2.4rem;
            margin-bottom: 12px;
        }

        h2 {
            font-size: 1.4rem;
            font-weight: 800;
            background: linear-gradient(135deg, #f7d774, #d4af37);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 6px;
        }

        .sub {
            font-size: 0.8rem;
            color: rgba(180, 170, 220, 0.65);
            margin-bottom: 28px;
            letter-spacing: 0.5px;
        }

        .input-group {
            margin-bottom: 14px;
            text-align: left;
        }

        .input-group label {
            display: block;
            font-size: 0.78rem;
            font-weight: 600;
            color: rgba(200, 190, 240, 0.7);
            margin-bottom: 6px;
            letter-spacing: 0.5px;
        }

        .input-group input {
            width: 100%;
            padding: 13px 16px;
            border-radius: 14px;
            border: 1px solid rgba(180, 140, 255, 0.2);
            outline: none;
            font-size: 0.92rem;
            font-family: 'Inter', sans-serif;
            background: rgba(255, 255, 255, 0.06);
            color: #fff;
            box-shadow: inset 0 1px 3px rgba(0, 0, 0, 0.5);
            transition: border-color 0.2s, box-shadow 0.2s;
        }

        .input-group input::placeholder {
            color: rgba(180, 170, 220, 0.45);
        }

        .input-group input:focus {
            border-color: rgba(212, 175, 55, 0.55);
            box-shadow: inset 0 1px 3px rgba(0, 0, 0, 0.5), 0 0 0 3px rgba(212, 175, 55, 0.12);
        }

        .hint {
            font-size: 0.72rem;
            color: rgba(180, 170, 220, 0.5);
            margin-top: 5px;
        }

        #errorMsg {
            background: rgba(255, 60, 60, 0.12);
            border: 1px solid rgba(255, 80, 80, 0.3);
            border-radius: 10px;
            padding: 10px 14px;
            font-size: 0.82rem;
            color: #ff8888;
            margin-bottom: 12px;
            display: none;
        }

        #successMsg {
            background: rgba(40, 200, 80, 0.12);
            border: 1px solid rgba(60, 220, 100, 0.3);
            border-radius: 10px;
            padding: 10px 14px;
            font-size: 0.82rem;
            color: #88ffaa;
            margin-bottom: 12px;
            display: none;
        }

        .register-btn {
            width: 100%;
            margin-top: 8px;
            padding: 14px;
            border-radius: 18px;
            border: none;
            cursor: pointer;
            font-size: 0.95rem;
            font-weight: 800;
            font-family: 'Inter', sans-serif;
            letter-spacing: 0.5px;
            background: linear-gradient(135deg, #f7d774, #d4af37, #b8962e);
            color: #2b2100;
            box-shadow: 0 8px 22px rgba(212, 175, 55, 0.5), inset 0 1px 0 rgba(255, 255, 255, 0.65);
            transition: all 0.25s cubic-bezier(0.34, 1.45, 0.64, 1);
        }

        .register-btn:hover {
            transform: translateY(-2px) scale(1.02);
            box-shadow: 0 14px 32px rgba(212, 175, 55, 0.7), inset 0 1px 0 rgba(255, 255, 255, 0.8);
        }

        .register-btn:disabled {
            opacity: 0.65;
            cursor: not-allowed;
            transform: none;
        }

        .footer-link {
            margin-top: 22px;
            font-size: 0.82rem;
            color: rgba(180, 170, 220, 0.65);
        }

        .footer-link a {
            color: #d4af37;
            font-weight: 700;
            text-decoration: none;
        }

        .footer-link a:hover {
            opacity: 0.75;
        }
    </style>
</head>

<body>
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>
    <button class="back-btn" onclick="window.location.href='user-login.html'">← Back to Login</button>

    <div class="card">
        <div class="icon">✨</div>
        <h2>Create Account</h2>
        <p class="sub">Join the AI Support System</p>

        <div class="input-group">
            <label>FULL NAME</label>
            <input id="name" type="text" placeholder="Enter your full name" />
        </div>
        <div class="input-group">
            <label>USERNAME</label>
            <input id="username" type="text" placeholder="Choose a unique username" autocomplete="username" />
        </div>
        <div class="input-group">
            <label>PASSWORD</label>
            <input id="password" type="password" placeholder="Min. 8 characters" autocomplete="new-password" />
            <p class="hint">Password must be at least 8 characters long.</p>
        </div>

        <div id="errorMsg"></div>
        <div id="successMsg"></div>

        <button class="register-btn" id="registerBtn" onclick="register()">Create Account →</button>

        <p class="footer-link">Already have an account? <a href="user-login.html">Login here</a></p>
    </div>

    <script>
        const API_BASE_URL =
            window.location.hostname === 'localhost'
                ? 'http://localhost:8081'
                : 'https://ai-assisted-customer-support-ticket.onrender.com';

        function showError(msg) {
            document.getElementById('errorMsg').textContent = msg;
            document.getElementById('errorMsg').style.display = 'block';
            document.getElementById('successMsg').style.display = 'none';
        }
        function showSuccess(msg) {
            document.getElementById('successMsg').textContent = msg;
            document.getElementById('successMsg').style.display = 'block';
            document.getElementById('errorMsg').style.display = 'none';
        }

        async function register() {
            const name = document.getElementById('name').value.trim();
            const username = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value;
            const btn = document.getElementById('registerBtn');

            // — Client-side validation —
            if (!name || !username || !password) { showError('All fields are required.'); return; }
            if (password.length < 8) { showError('Password must be at least 8 characters.'); return; }
            if (!/^[a-zA-Z0-9_]+$/.test(username)) { showError('Username can only contain letters, numbers, and underscores.'); return; }

            btn.disabled = true;
            btn.textContent = 'Creating account…';

            try {
                const res = await fetch(`${API_BASE_URL}/api/auth/register`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ name, username, password })
                });

                const data = await res.json().catch(() => ({}));

                if (!res.ok) {
                    // Backend error (e.g. 409 = username taken)
                    showError(data.message || 'Registration failed. Please try again.');
                    return;
                }

                showSuccess('Account created! Redirecting to login…');
                setTimeout(() => { window.location.href = 'user-login.html'; }, 1400);

            } catch {
                showError('Cannot reach server. Please make sure the backend is running.');
            } finally {
                btn.disabled = false;
                btn.textContent = 'Create Account →';
            }
        }

        document.addEventListener('keydown', (e) => { if (e.key === 'Enter') register(); });
    </script>
</body>

</html>
